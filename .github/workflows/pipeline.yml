name: Daily Market Pipeline
permissions:
  contents: write
on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6 AM UTC
  workflow_dispatch:       # allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords')"

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python run_market_engine.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/processed/daily_market_metrics.csv
          git add data/processed/brand_daily_metrics.csv
          git add data/processed/market_forecast_history.csv
          git add data/processed/brand_forecast_history.csv
          git diff --cached --quiet || git commit -m "Update daily metrics"
          git pull origin main --rebase
          git push origin main